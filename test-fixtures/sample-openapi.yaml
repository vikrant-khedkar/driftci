openapi: 3.0.3
info:
  title: Sample API
  version: 2.1.0
paths:
  /v2/users:
    get:
      operationId: listUsers
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer }
      responses: { '200': { description: ok } }
    post:
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name]
              properties:
                email: { type: string }
                name: { type: string }
                role: { type: string }
      responses: { '201': { description: created } }
  /v2/users/{id}:
    get:
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses: { '200': { description: ok } }
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
security:
  - bearer: []
